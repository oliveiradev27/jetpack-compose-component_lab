name: Code coverage check

on:
  pull_request:
    branches: [ main ] # Trigger on pull requests to the main branch
  workflow_dispatch: # Allows manual trigger from the Actions tab

jobs:
  run-code-coverage-check:
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Grant execute permission to gradlew
        run: chmod +x gradlew # Ensure gradlew is executable

      - name: Generate JaCoCo coverage report
        run: ./gradlew clean generateJacocoCoverageReport

      - name: Publish Code Coverage Report to PR
        uses: [Madrapps/jacoco-report](https://github.com/marketplace/actions/jacoco-report)@v1.3.1
        with:
          paths: |
            ${{ github.workspace }}/**/build/reports/jacoco/generateJacocoCoverageReport/generateJacocoCoverageReport.xml
          token: ${{ secrets.GITHUB_TOKEN }}
          min-coverage-overall: 80 # Set minimum coverage threshold
